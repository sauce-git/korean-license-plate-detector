name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false

env:
  HF_MODEL_REPO: sauce-hug/korean-license-plate-detector

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: ''
          - os: macos-latest
            platform: macos
            ext: ''
          - os: windows-latest
            platform: windows
            ext: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download models
        run: |
          python -c "import sys; sys.path.insert(0, 'src'); from utils.model_loader import download_all_models; download_all_models()"

      - name: Build executable
        run: |
          python -m PyInstaller korean-license-plate-detector.spec --noconfirm

      - name: Create archive (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          tar -czvf korean-license-plate-detector-${{ matrix.platform }}.tar.gz korean-license-plate-detector/

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd dist
          7z a korean-license-plate-detector-${{ matrix.platform }}.zip korean-license-plate-detector/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: korean-license-plate-detector-${{ matrix.platform }}
          path: |
            dist/korean-license-plate-detector-${{ matrix.platform }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
