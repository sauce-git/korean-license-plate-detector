name: Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HF_MODEL_REPO: sauce-hug/korean-license-plate-detector

jobs:
  build:
    name: Build Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download models
        run: |
          python -c "import sys; sys.path.insert(0, 'src'); from utils.model_loader import download_all_models; download_all_models()"

      - name: Build
        run: python -m PyInstaller korean-license-plate-detector.spec --noconfirm

      - name: Apply ad-hoc signature (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - dist/korean-license-plate-detector/korean-license-plate-detector

      - name: Verify build
        run: test -f dist/korean-license-plate-detector/korean-license-plate-detector
