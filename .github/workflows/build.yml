name: Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HF_MODEL_REPO: sauce-hug/korean-license-plate-detector
  HF_MODEL_CACHE: .cache
  HF_HUB_CACHE: .cache/huggingface

jobs:
  build:
    name: Build Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download models
        run: |
          python -c "from klpd.models import download_all_models; download_all_models()"

      - name: Build
        run: python -m PyInstaller korean-license-plate-detector.spec --noconfirm

      - name: Verify build
        run: test -f dist/korean-license-plate-detector/korean-license-plate-detector
