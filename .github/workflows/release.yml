name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  HF_MODEL_REPO: sauce-hug/korean-license-plate-detector
  HF_MODEL_CACHE: .cache
  HF_HUB_CACHE: .cache/huggingface

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download models
        run: |
          python -c "from klpd.models import download_all_models; download_all_models()"

      - name: Build executable
        run: python -m PyInstaller korean-license-plate-detector.spec --noconfirm

      - name: Create archive (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd dist
          tar -czvf korean-license-plate-detector-${{ matrix.platform }}.tar.gz korean-license-plate-detector/

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd dist
          7z a korean-license-plate-detector-${{ matrix.platform }}.zip korean-license-plate-detector/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: korean-license-plate-detector-${{ matrix.platform }}
          path: dist/korean-license-plate-detector-${{ matrix.platform }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
